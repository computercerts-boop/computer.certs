<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>دليل الشهادات الاحترافية في تقنية المعلومات</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface2: #1a2235;
    --border: #1e2d45;
    --accent: #3b82f6;
    --accent2: #06b6d4;
    --accent3: #8b5cf6;
    --text: #e2e8f0;
    --muted: #64748b;
    --beginner: #10b981;
    --intermediate: #f59e0b;
    --advanced: #ef4444;
    --saudi: #059669;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'IBM Plex Sans Arabic', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    direction: rtl;
  }

  .hero {
    position: relative;
    overflow: hidden;
    padding: 60px 24px 40px;
    text-align: center;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: -120px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 400px;
    background: radial-gradient(ellipse, rgba(59,130,246,0.18) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-badge {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    background: rgba(59,130,246,0.12);
    border: 1px solid rgba(59,130,246,0.3);
    padding: 6px 16px;
    border-radius: 100px;
    font-size: 13px;
    color: var(--accent);
    margin-bottom: 20px;
  }

  .hero h1 {
    font-size: clamp(26px, 5vw, 44px);
    font-weight: 700;
    line-height: 1.3;
    background: linear-gradient(135deg, #e2e8f0 30%, #60a5fa 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    margin-bottom: 12px;
  }

  .hero p {
    color: var(--muted);
    font-size: 15px;
    max-width: 560px;
    margin: 0 auto;
  }

  .stats-row {
    display: flex;
    justify-content: center;
    gap: 32px;
    margin-top: 28px;
    flex-wrap: wrap;
  }

  .stat {
    text-align: center;
  }

  .stat-num {
    font-size: 28px;
    font-weight: 700;
    color: var(--accent);
  }

  .stat-label {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }

  .controls {
    max-width: 1200px;
    margin: 0 auto 28px;
    padding: 0 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .search-wrap {
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 14px 48px 14px 18px;
    color: var(--text);
    font-family: inherit;
    font-size: 14px;
    outline: none;
    transition: border-color .2s;
  }

  .search-wrap input:focus { border-color: var(--accent); }

  .search-icon {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 16px;
    pointer-events: none;
  }

  .filters {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
  }

  .filter-btn {
    padding: 8px 16px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: var(--surface);
    color: var(--muted);
    font-family: inherit;
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }

  .filter-btn:hover { border-color: var(--accent); color: var(--text); }
  .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

  .level-filters { display: flex; gap: 8px; flex-wrap: wrap; }

  .level-btn {
    padding: 7px 14px;
    border-radius: 100px;
    border: 1px solid var(--border);
    background: transparent;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
  }

  .level-btn[data-level="مبتدئ"] { color: var(--beginner); border-color: rgba(16,185,129,0.3); }
  .level-btn[data-level="متوسط"] { color: var(--intermediate); border-color: rgba(245,158,11,0.3); }
  .level-btn[data-level="متقدم"] { color: var(--advanced); border-color: rgba(239,68,68,0.3); }
  .level-btn.active[data-level="مبتدئ"] { background: rgba(16,185,129,0.15); }
  .level-btn.active[data-level="متوسط"] { background: rgba(245,158,11,0.15); }
  .level-btn.active[data-level="متقدم"] { background: rgba(239,68,68,0.15); }

  .controls-bottom {
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 10px;
  }

  .results-count { color: var(--muted); font-size: 13px; }
  .results-count span { color: var(--text); font-weight: 600; }

  .reset-btn {
    padding: 7px 14px;
    border-radius: 8px;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--muted);
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    transition: all .2s;
  }

  .reset-btn:hover { color: var(--text); border-color: var(--accent); }

  .grid {
    max-width: 1200px;
    margin: 0 auto;
    padding: 0 20px 60px;
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 16px;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: transform .2s, border-color .2s, box-shadow .2s;
    position: relative;
    overflow: hidden;
  }

  .card::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 80px; height: 80px;
    border-radius: 0 16px 0 80px;
    opacity: 0.06;
    transition: opacity .2s;
  }

  .card.beginner::before { background: var(--beginner); }
  .card.intermediate::before { background: var(--intermediate); }
  .card.advanced::before { background: var(--advanced); }
  .card.saudi::before { background: var(--saudi); }

  .card:hover {
    transform: translateY(-3px);
    border-color: rgba(59,130,246,0.4);
    box-shadow: 0 8px 32px rgba(0,0,0,0.3);
  }

  .card:hover::before { opacity: 0.12; }

  .card-top {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 10px;
  }

  .category-tag {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 100px;
    background: rgba(59,130,246,0.12);
    color: var(--accent);
    border: 1px solid rgba(59,130,246,0.2);
    white-space: nowrap;
    flex-shrink: 0;
  }

  .category-tag.saudi-tag {
    background: rgba(5,150,105,0.12);
    color: var(--saudi);
    border: 1px solid rgba(5,150,105,0.2);
  }

  .level-badge {
    font-size: 11px;
    padding: 4px 10px;
    border-radius: 100px;
    font-weight: 600;
    flex-shrink: 0;
  }

  .level-badge.مبتدئ { background: rgba(16,185,129,0.12); color: var(--beginner); border: 1px solid rgba(16,185,129,0.25); }
  .level-badge.متوسط { background: rgba(245,158,11,0.12); color: var(--intermediate); border: 1px solid rgba(245,158,11,0.25); }
  .level-badge.متقدم { background: rgba(239,68,68,0.12); color: var(--advanced); border: 1px solid rgba(239,68,68,0.25); }

  .card-name {
    font-size: 15px;
    font-weight: 600;
    line-height: 1.4;
    color: var(--text);
  }

  .card-desc {
    font-size: 13px;
    color: var(--muted);
    line-height: 1.6;
  }

  .card-meta {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
    margin-top: auto;
  }

  .meta-item {
    display: flex;
    align-items: center;
    gap: 5px;
    font-size: 12px;
    color: var(--muted);
  }

  .meta-item .icon { font-size: 13px; }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding-top: 12px;
    border-top: 1px solid var(--border);
  }

  .provider {
    font-size: 12px;
    color: var(--muted);
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .apply-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 8px 16px;
    background: var(--accent);
    color: #fff;
    border-radius: 8px;
    text-decoration: none;
    font-size: 12px;
    font-weight: 600;
    transition: all .2s;
  }

  .apply-btn:hover {
    background: #2563eb;
    transform: translateX(-2px);
  }

  .cost {
    font-size: 13px;
    font-weight: 600;
  }

  .cost.free { color: var(--beginner); }
  .cost.paid { color: var(--text); }

  .empty {
    grid-column: 1/-1;
    text-align: center;
    padding: 80px 20px;
  }

  .empty-icon { font-size: 48px; margin-bottom: 16px; }
  .empty h3 { font-size: 18px; margin-bottom: 8px; }
  .empty p { color: var(--muted); font-size: 14px; }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  input::placeholder { color: var(--muted); }

  @media (max-width: 600px) {
    .grid { grid-template-columns: 1fr; }
    .stats-row { gap: 20px; }
  }
</style>
</head>
<body>

<div class="hero">
  <div class="hero-badge">🎓 دليل شامل ومحدّث</div>
  <h1>الشهادات الاحترافية<br>في تقنية المعلومات</h1>
  <p>أكثر من 105 شهادات احترافية في جميع تخصصات الحاسب، مع مستوى كل شهادة ورابط التقديم المباشر</p>
  <div class="stats-row">
    <div class="stat"><div class="stat-num" id="total-count">105+</div><div class="stat-label">شهادة احترافية</div></div>

    <div class="stat"><div class="stat-num">40+</div><div class="stat-label">جهة معتمدة</div></div>
  </div>
</div>

<div class="controls">
  <div class="search-wrap">
    <input type="text" id="search" placeholder="ابحث عن شهادة أو جهة...">
    <span class="search-icon">🔍</span>
  </div>

  <div class="filters" id="category-filters"></div>

  <div class="level-filters">
    <button class="level-btn active" data-level="الكل">جميع المستويات</button>
    <button class="level-btn" data-level="مبتدئ">🟢 مبتدئ</button>
    <button class="level-btn" data-level="متوسط">🟡 متوسط</button>
    <button class="level-btn" data-level="متقدم">🔴 متقدم</button>
  </div>

  <div class="controls-bottom">
    <div class="results-count">عرض <span id="shown-count">0</span> شهادة</div>
    <button class="reset-btn" onclick="resetFilters()">↺ إعادة ضبط</button>
  </div>
</div>

<div class="grid" id="grid"></div>

let activeCategory = 'الكل';
let activeLevel = 'الكل';
let searchTerm = '';

const categories = ['الكل', ...new Set(certs.map(c => c.category))];

const catContainer = document.getElementById('category-filters');
categories.forEach(cat => {
  const btn = document.createElement('button');
  btn.className = 'filter-btn' + (cat === 'الكل' ? ' active' : '');
  btn.textContent = cat === 'الكل' ? '📋 الكل' : cat;
  btn.onclick = () => {
    activeCategory = cat;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
  catContainer.appendChild(btn);
});

document.querySelectorAll('.level-btn').forEach(btn => {
  btn.onclick = () => {
    activeLevel = btn.dataset.level;
    document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  };
});

document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.trim().toLowerCase();
  render();
});

function resetFilters() {
  activeCategory = 'الكل';
  activeLevel = 'الكل';
  searchTerm = '';
  document.getElementById('search').value = '';
  document.querySelectorAll('.filter-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  document.querySelectorAll('.level-btn').forEach((b,i) => b.classList.toggle('active', i===0));
  render();
}

function levelClass(level) {
  if (level === 'مبتدئ') return 'beginner';
  if (level === 'متوسط') return 'intermediate';
  return 'advanced';
}

function render() {
  const filtered = certs.filter(c => {
    if (activeCategory !== 'الكل' && c.category !== activeCategory) return false;
    if (activeLevel !== 'الكل' && c.level !== activeLevel) return false;
    if (searchTerm && !c.name.toLowerCase().includes(searchTerm) && !c.provider.toLowerCase().includes(searchTerm) && !c.desc.includes(searchTerm)) return false;
    return true;
  });

  document.getElementById('shown-count').textContent = filtered.length;

  const grid = document.getElementById('grid');
  if (filtered.length === 0) {
    grid.innerHTML = `<div class="empty"><div class="empty-icon">🔍</div><h3>لا توجد نتائج</h3><p>جرّب تغيير كلمة البحث أو الفلاتر</p></div>`;
    return;
  }

  const isSaudiCat = activeCategory === 'الشهادات السعودية والإقليمية';

  grid.innerHTML = filtered.map(c => `
    <div class="card ${levelClass(c.level)}">
      <div class="card-top">
        <span class="category-tag ${c.category === 'الشهادات السعودية والإقليمية' ? 'saudi-tag' : ''}">${c.category}</span>
        <span class="level-badge ${c.level}">${c.level}</span>
      </div>
      <div class="card-name">${c.name}</div>
      <div class="card-desc">${c.desc}</div>
      <div class="card-meta">
        <div class="meta-item"><span class="icon">🏢</span>${c.provider}</div>
        <div class="meta-item cost ${c.cost === 0 ? 'free' : 'paid'}">
          <span class="icon">💰</span>${c.cost === 0 ? 'مجاناً' : c.cost.toLocaleString() + ' ر.س'}
        </div>
      </div>
      <div class="card-footer">
        <a href="${c.url}" target="_blank" rel="noopener" class="apply-btn">التقديم المباشر ←</a>
      </div>
    </div>
  `).join('');
}

render();
